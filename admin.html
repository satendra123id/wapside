<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control - WebStore</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; margin: 0; display: flex; background-color: #f1f5f9; height: 100vh; overflow: hidden; }
        
        /* Sidebar Navigation */
        .sidebar { width: 260px; background-color: #0f172a; color: white; padding: 20px; display: flex; flex-direction: column; box-sizing: border-box;}
        .sidebar h2 { color: #38bdf8; margin-top: 0; font-size: 22px; text-align: center; border-bottom: 1px solid #1e293b; padding-bottom: 15px;}
        .sidebar button { background: none; border: none; color: #cbd5e1; text-align: left; padding: 12px; margin-bottom: 8px; cursor: pointer; border-radius: 6px; font-size: 15px; transition: 0.2s; }
        .sidebar button:hover, .sidebar button.active { background: #1e293b; color: white; border-left: 4px solid #38bdf8; }
        
        /* Main Content */
        .main-content { flex: 1; padding: 20px; overflow-y: auto; box-sizing: border-box;}
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: none; height: calc(100vh - 40px); box-sizing: border-box; overflow: hidden;}
        .active-card { display: block; }
        h3 { margin-top: 0; color: #1e293b; font-size: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 10px;}
        
        label { display: block; margin-top: 10px; font-size: 13px; font-weight: 600; color: #475569; }
        input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #cbd5e1; border-radius: 6px; font-family: inherit; box-sizing: border-box; outline: none; }
        .btn-publish { background: #10b981; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 15px; font-weight: 600; width: 100%; }
        .btn-update { background: #38bdf8; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 15px; font-weight: 600; width: 100%; display: none; }
        
        /* Live Chat Layout */
        .chat-container { display: flex; height: calc(100% - 40px); border-radius: 8px; overflow: hidden; border: 1px solid #e2e8f0; }
        .user-list { width: 35%; background: #f8fafc; border-right: 1px solid #e2e8f0; overflow-y: auto; }
        .user-item { padding: 12px; border-bottom: 1px solid #e2e8f0; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .user-item:hover, .user-item.active { background: #e0f2fe; border-left: 4px solid #38bdf8; }
        .chat-area { width: 65%; display: flex; flex-direction: column; background: white; }
        .chat-header { padding: 15px; background: #0f172a; color: white; font-weight: 600; font-size: 15px; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f1f5f9; }
        .chat-input-area { padding: 15px; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; background: white;}
        .chat-input-area input { margin: 0; flex: 1; }
        .btn-send { background: #38bdf8; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600;}
        
        .msg { padding: 10px 15px; border-radius: 8px; font-size: 14px; max-width: 75%; word-wrap: break-word; }
        .msg-client { background: white; border: 1px solid #e2e8f0; align-self: flex-start; border-top-left-radius: 0; color: #1e293b;}
        .msg-me { background: #38bdf8; color: white; align-self: flex-end; border-top-right-radius: 0; }

        /* Products Table Management */
        .table-container { height: calc(100% - 50px); overflow-y: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; color: #475569; font-weight: 600; }
        .action-btns { display: flex; gap: 5px; }
        .btn-edit { background: #38bdf8; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }

        .login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#0f172a; display:flex; align-items:center; justify-content:center; z-index:9999; }
        .login-box { background:white; padding:30px; border-radius:12px; text-align:center; width:90%; max-width:350px; }

        @media (max-width: 768px) {
            body { flex-direction: column; height: 100vh; overflow: hidden; }
            .sidebar { width: 100%; height: auto; padding: 10px; display: flex; flex-direction: row; justify-content: space-around; background-color: #0f172a; border-bottom: 2px solid #1e293b; box-sizing: border-box; }
            .sidebar h2, .sidebar p { display: none; }
            .sidebar button { flex: 1; text-align: center; padding: 8px 4px; margin: 0 2px; font-size: 11px; background: #1e293b; border-radius: 6px; }
            .sidebar button.active { background: #38bdf8; color: white; }
            .main-content { padding: 10px; height: calc(100vh - 60px); }
            .card { height: 100%; padding: 10px; overflow-y: auto;}
            .chat-container { flex-direction: column; }
            .user-list { width: 100%; height: 35%; border-right: none; border-bottom: 1px solid #cbd5e1; }
            .chat-area { width: 100%; height: 65%; }
            table { font-size: 12px; }
            th, td { padding: 8px; }
        }
    </style>
</head>
<body>

    <div class="login-overlay" id="lockScreen">
        <div class="login-box">
            <h3 style="border:none; margin-bottom:15px;">Admin Security Check</h3>
            <input type="password" id="passInput" placeholder="Enter Admin Password" style="margin-bottom:15px;">
            <button class="btn-publish" style="margin:0;" onclick="checkPassword()">Login Dashboard</button>
        </div>
    </div>

    <div class="sidebar">
        <h2>Admin Panel</h2>
        <p style="color: #cbd5e1; font-size: 14px; text-align: center; margin-top:0;">Live Order Monitoring</p>
        <button id="btn-chat" onclick="showTab('live-chat', 'btn-chat')" class="active">💬 Customer Chats</button>
        <button id="btn-add" onclick="showTab('add-product', 'btn-add')">➕ Add Website</button>
        <button id="btn-manage" onclick="showTab('manage-products', 'btn-manage')">📁 Listed Websites</button>
    </div>

    <div class="main-content">
        
        <div id="live-chat" class="card active-card" style="padding: 0; overflow: hidden;">
            <div class="chat-container">
                <div class="user-list" id="userListContainer">
                    <div style="padding:15px; text-align:center; color:#64748b; font-size:12px;">No active clients yet</div>
                </div>
                <div class="chat-area">
                    <div class="chat-header" id="currentChatHeader">Select a customer to start chat</div>
                    <div class="chat-box" id="adminChatBox">
                        <div style="text-align:center; color:#64748b; margin-top:20px; font-size:14px;">Kisi client par click karein unka message dekhne ke liye.</div>
                    </div>
                    <div class="chat-input-area">
                        <input type="text" id="adminInput" placeholder="Type message or paste zip link...">
                        <button class="btn-send" onclick="sendAdminMessage()">Send</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="add-product" class="card">
            <h3 id="formHeading">Publish a New Website / Course</h3>
            <form id="addProductForm" onsubmit="event.preventDefault();">
                <input type="hidden" id="editProductId"> <label>Website / Product Title:</label>
                <input type="text" id="prodTitle" placeholder="e.g., Corsess wapside" required>

                <label>Short Description:</label>
                <textarea rows="2" id="prodDesc" placeholder="e.g., Buy sell tools and all digital products" required></textarea>
                
                <label>Price (₹):</label>
                <input type="number" id="prodPrice" placeholder="e.g., 249" required>

                <label>Live Demo Website Link (URL):</label>
                <input type="url" id="prodDemo" placeholder="https://thenewtips.eu.cc" required>

                <button type="button" id="publishBtn" class="btn-publish" onclick="publishProduct()">Publish to Main Website</button>
                <button type="button" id="updateBtn" class="btn-update" onclick="updateProduct()">Save Updated Details</button>
            </form>
        </div>

        <div id="manage-products" class="card" style="overflow: hidden;">
            <h3>Manage Listed Websites</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Price</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="adminProductsTable">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA1NVyjNnuVfc1_mOq0kH0zlo7MMgWvBRE",
            authDomain: "elitewebmarket.firebaseapp.com",
            databaseURL: "https://elitewebmarket-default-rtdb.firebaseio.com", 
            projectId: "elitewebmarket",
            storageBucket: "elitewebmarket.firebasestorage.app",
            messagingSenderId: "692589185129",
            appId: "1:692589185129:web:9decb80e2a2e4cf67b7af8"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        let selectedClientId = null;

        function checkPassword() {
            let enteredPass = document.getElementById('passInput').value;
            if(enteredPass === "Yash123") { document.getElementById('lockScreen').style.display = 'none'; } 
            else { alert("Wrong Password! Access Denied."); }
        }

        function showTab(tabId, btnId) {
            document.querySelectorAll('.card').forEach(card => card.classList.remove('active-card'));
            document.querySelectorAll('.sidebar button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active-card');
            document.getElementById(btnId).classList.add('active');
            
            // Reset Edit mode if tab switched to normal add
            if(tabId === 'add-product' && document.getElementById('editProductId').value === "") {
                resetFormMode();
            }
        }

        // 1. Publish Product (Add New)
        function publishProduct() {
            let title = document.getElementById('prodTitle').value.trim();
            let desc = document.getElementById('prodDesc').value.trim();
            let price = document.getElementById('prodPrice').value.trim();
            let demoLink = document.getElementById('prodDemo').value.trim();

            if(title == "" || desc == "" || price == "" || demoLink == "") { alert("Saari fields bharna zaroori hai!"); return; }

            db.ref('products').push({ title, desc, price, demoLink, timestamp: Date.now() }).then(() => {
                alert("🎉 Success! Product live ho gaya.");
                document.getElementById('addProductForm').reset();
                showTab('manage-products', 'btn-manage');
            });
        }

        // 2. Load Products Into Admin Table with Full Control
        db.ref('products').on('value', function(snapshot) {
            let tbody = document.getElementById('adminProductsTable');
            tbody.innerHTML = "";
            let products = snapshot.val();
            
            if(products) {
                Object.keys(products).forEach(key => {
                    let item = products[key];
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${item.title}</strong></td>
                            <td style="color:green;font-weight:600;">₹${item.price}</td>
                            <td>
                                <div class="action-btns">
                                    <button class="btn-edit" onclick="startEditMode('${key}', '${item.title}', \`${item.desc}\`, '${item.price}', '${item.demoLink}')">✏️ Edit</button>
                                    <button class="btn-delete" onclick="removeProduct('${key}')">❌ Delete</button>
                                </div>
                            </td>
                        </tr>`;
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#64748b;">No products listed yet!</td></tr>';
            }
        });

        // 3. Remove/Delete Product
        function removeProduct(productId) {
            if(confirm("Kya aap sach me is website ko main page se hatana chahte hain?")) {
                db.ref('products/' + productId).remove().then(() => {
                    alert("🗑️ Product successfully removed!");
                });
            }
        }

        // 4. Trigger Edit Mode (Fill form fields)
        function startEditMode(id, title, desc, price, demoLink) {
            document.getElementById('editProductId').value = id;
            document.getElementById('prodTitle').value = title;
            document.getElementById('prodDesc').value = desc;
            document.getElementById('prodPrice').value = price;
            document.getElementById('prodDemo').value = demoLink;

            // UI modification for edit action
            document.getElementById('formHeading').innerText = "✏️ Edit Website Details";
            document.getElementById('publishBtn').style.display = 'none';
            document.getElementById('updateBtn').style.display = 'block';

            showTab('add-product', 'btn-add');
        }

        // 5. Update Existing Product Database
        function updateProduct() {
            let id = document.getElementById('editProductId').value;
            let title = document.getElementById('prodTitle').value.trim();
            let desc = document.getElementById('prodDesc').value.trim();
            let price = document.getElementById('prodPrice').value.trim();
            let demoLink = document.getElementById('prodDemo').value.trim();

            if(title == "" || desc == "" || price == "" || demoLink == "") { alert("Saari fields bharna zaroori hai!"); return; }

            db.ref('products/' + id).update({ title, desc, price, demoLink }).then(() => {
                alert("🔄 Details updated successfully!");
                document.getElementById('addProductForm').reset();
                resetFormMode();
                showTab('manage-products', 'btn-manage');
            });
        }

        function resetFormMode() {
            document.getElementById('editProductId').value = "";
            document.getElementById('formHeading').innerText = "Publish a New Website / Course";
            document.getElementById('publishBtn').style.display = 'block';
            document.getElementById('updateBtn').style.display = 'none';
        }

        // Realtime active users live feed monitoring
        db.ref('activeUsers').on('value', function(snapshot) {
            let container = document.getElementById('userListContainer');
            container.innerHTML = "";
            let users = snapshot.val();
            if(users) {
                Object.keys(users).forEach(key => {
                    let user = users[key];
                    let activeClass = selectedClientId === user.id ? 'active' : '';
                    container.innerHTML += `
                        <div class="user-item ${activeClass}" onclick="openClientChat('${user.id}')">
                            <strong>${user.id}</strong>
                            <p style="margin:4px 0 0; color:#64748b; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${user.lastMessage}</p>
                        </div>`;
                });
            } else {
                container.innerHTML = '<div style="padding:15px; text-align:center; color:#64748b; font-size:12px;">No active clients yet</div>';
            }
        });

        function openClientChat(clientId) {
            selectedClientId = clientId;
            document.getElementById('currentChatHeader').innerText = "Chatting with: " + clientId;
            document.querySelectorAll('.user-item').forEach(item => item.classList.remove('active'));
            
            db.ref('userChats/' + clientId).on('value', function(snapshot) {
                let chatBox = document.getElementById('adminChatBox');
                chatBox.innerHTML = "";
                let messages = snapshot.val();
                if(messages) {
                    Object.keys(messages).forEach(mKey => {
                        let msgData = messages[mKey];
                        let formattedMsg = msgData.message.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color: inherit; text-decoration: underline;">$1</a>');
                        
                        if(msgData.sender === "Customer") {
                            chatBox.innerHTML += `<div class="msg msg-client">${formattedMsg}</div>`;
                        } else {
                            chatBox.innerHTML += `<div class="msg msg-me">${formattedMsg}</div>`;
                        }
                    });
                }
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        function sendAdminMessage() {
            let input = document.getElementById('adminInput');
            let text = input.value.trim();
            if(text !== "" && selectedClientId) {
                db.ref('userChats/' + selectedClientId).push({
                    sender: "Admin",
                    message: text,
                    timestamp: Date.now()
                });
                input.value = "";
            }
        }
    </script>
</body>
</html>
